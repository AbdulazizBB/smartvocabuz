[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/explain"
  to   = "/.netlify/functions/explain"
  status = 200

[[redirects]]
  from = "/api/track"
  to   = "/.netlify/functions/track"
  status = 200

[[redirects]]
  from = "/api/admin"
  to   = "/.netlify/functions/admin"
  status = 200

[[headers]]
  for = "/locales/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
