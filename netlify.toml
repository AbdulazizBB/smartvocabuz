# SmartVocab — Netlify konfiguratsiyasi
# Tarjimalar index.html ichida inline (locales/ papkasi yo'q)

[build]
  publish = "."
  functions = "netlify/functions"

# API marshrut yo'naltirishlari
[[redirects]]
  from = "/api/explain"
  to   = "/.netlify/functions/explain"
  status = 200

[[redirects]]
  from = "/api/track"
  to   = "/.netlify/functions/track"
  status = 200

[[redirects]]
  from = "/api/admin"
  to   = "/.netlify/functions/admin"
  status = 200

# Xavfsizlik sarlavhalari
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
